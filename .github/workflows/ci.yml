name: Django Cloud Pipeline (Chapter 10)

on:
  push:
    branches: [ "master" ]

jobs:
  test:
    name: Test Stage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Tests
        run: python manage.py test

  build:
    name: Build & Package Stage
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build Docker Image
        run: docker build -t cloud-app:latest .
      - name: Package Artifact
        run: echo "Application packaged as cloud-app:latest"

  deploy:
    name: Deployment Stage
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Simulate Production Deployment
        run: |
          echo "Connecting to test environment..."
          echo "Deploying container image to Cloud Host..."
          echo "Deployment successful: http://cloud-app-test.internal"